# Ruff configuration for the mf6-training repo.
# Applies to Python files and Jupyter notebooks (ruff handles .ipynb natively).
# See https://docs.astral.sh/ruff/settings/ for all options.

# Match the Python version pinned in pixi.toml.
target-version = "py311"

line-length = 88
indent-width = 4

[lint]
# Ruff's default rules (E4/E7/E9 pyflakes-style + F) plus:
#   I  - isort (import sorting)
#   W  - pycodestyle warnings
#   UP - pyupgrade (modernize syntax for the target version)
#   B  - flake8-bugbear (likely bugs)
select = ["E4", "E7", "E9", "F", "I", "W", "UP", "B"]
ignore = []

# Allow autofix for all enabled rules when running `ruff check --fix`.
fixable = ["ALL"]
unfixable = []

# Teaching materials under examples/notebooks/ are held to the full rule set
# except a few that don't fit interactive teaching notebooks and can't be fixed
# without rewriting the lesson code. (Unused *variables* - F841 - are eliminated,
# not ignored.) The project's own scripts/ keep the full rule set.
[lint.per-file-ignores]
"examples/notebooks/**" = [
    "B007",  # loop control variable not used within loop body
    "B905",  # zip() without an explicit strict= argument
    "F403",  # `from module import *` (used for brevity in some notebooks)
    "F405",  # name may be undefined, or defined from a star import
    "F821",  # undefined name (cells that rely on interactive/earlier state)
]

[format]
# Match Black's defaults (double quotes, spaces, trailing commas as needed).
quote-style = "double"
indent-style = "space"
line-ending = "auto"
