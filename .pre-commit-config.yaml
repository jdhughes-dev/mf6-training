# Pre-commit hooks for the mf6-training repo.
#
# Install once per clone (inside the pixi environment):
#
#     pixi run pre-commit-install
#
# On every `git commit` the staged files are:
#   1. stripped of notebook outputs / execution counts (nbstripout; the class
#      notebooks under examples/notebooks/),
#   2. spell-checked and auto-corrected (codespell), then
#   3. lint-fixed and formatted with ruff.
#
# codespell and ruff run on all Python scripts plus the notebooks under
# examples/notebooks/; nbstripout runs on those notebooks only.
#
# These hooks use pre-commit's OWN managed tool environments (not the pixi env),
# so `git commit` works from any Git client - VS Code, the CLI, etc. - without
# needing the pixi environment activated. Tool configuration still comes from
# ruff.toml and .codespellrc. Versions are pinned below (kept in sync with
# pixi.lock); bump them with `pixi run pre-commit autoupdate`.
#
# Run against everything with:
#
#     pixi run pre-commit-run
repos:
  - repo: https://github.com/kynan/nbstripout
    rev: "0.9.1"
    hooks:
      - id: nbstripout
        # Only strip the class notebooks under examples/notebooks/.
        files: ^examples/notebooks/.*\.ipynb$

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        # --write-changes auto-corrects typos (config in .codespellrc).
        args: [--write-changes]
        # All Python scripts, plus the notebooks under examples/notebooks/.
        files: (\.pyi?$|^examples/notebooks/.*\.ipynb$)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
        # All Python scripts, plus the notebooks under examples/notebooks/.
        files: (\.pyi?$|^examples/notebooks/.*\.ipynb$)
      - id: ruff-format
        files: (\.pyi?$|^examples/notebooks/.*\.ipynb$)
