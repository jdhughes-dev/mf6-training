[workspace]
name = "mf6-training"
version = "0.1.0"
channels = ["conda-forge"]
# Per-platform virtual-package requirements (replaces the deprecated
# [system-requirements] table):
#  - linux-64 pins a lower __linux (kernel) version for the openmpi/petsc stack
#    used by the parallel (extended) MODFLOW 6 build.
#  - the macOS minimums keep resolution on recent SDKs so conda-forge can supply
#    the openmpi/petsc binaries the extended MODFLOW 6 build links against.
platforms = [
    "win-64",
    { platform = "linux-64", linux = "4.4.0" },
    { platform = "linux-aarch64", linux = "4.4.0" },
    { platform = "osx-arm64", macos = "14.0" },
    "osx-64",
]

[dependencies]
python = "3.11.*"
pandas = ">=2.0,<3.0"
numpy = "*"
matplotlib = "*"
jupyter = "*"
jupyterlab = "*"
notebook = "*"
scipy = "*"
shapely = "*"
rtree = "*"
pyproj = ">=2.0"
pyshp = "*"
git = "*"
nbconvert = "*"
# Core MODFLOW 6 stack (flopy to build/post-process models; modflowapi to drive
# a running MODFLOW 6 through the libmf6 shared library). BOTH are pulled from
# their develop branches in [pypi-dependencies] below - not the conda flopy -
# because the fixes we need are not in a conda-forge release yet:
#   * flopy: Mf6Splitter cannot split GWT advanced-transport packages (SFT/LKT/
#     UZT/MWT) in the 3.10.0 release - it reads a non-existent .perioddata and
#     mis-keys the SFR remap table; develop fixes both (used by parallel.ipynb).
#   * modflowapi: the 0.2.0 release calls np.arange() on a 1-element array, which
#     NumPy 2.x rejects; develop fixes it with .item().
# Dev tooling for the pre-commit hook: ruff (lint + format), nbstripout
# (clear notebook outputs), and codespell (spell-check + fix), driven by
# pre-commit itself. See .pre-commit-config.yaml and the pre-commit-install
# task below.
ruff = "*"
nbstripout = "*"
codespell = "*"
pre-commit = "*"
xarray = ">=2026.4.0,<2027"
netcdf4 = ">=1.7.2,<2"
pyarrow = ">=21.0.0,<25"
ipython = ">=9.15.0,<10"
ipywidgets = ">=8.1.8,<9"
geopandas = ">=1.1.4,<2"
pyvista = ">=0.44.1,<0.49"
rasterio = ">=1.4.3,<2"
rasterstats = ">=0.21.0,<0.22"
# Mf6Splitter extras (model-splitting-with-flopy.ipynb): pymetis powers
# optimize_splitting_mask()'s load-balanced partitioning; h5py backs
# save_node_mapping()/load_node_mapping().
pymetis = "*"
h5py = "*"

[pypi-dependencies]
# flopy and modflowapi track their develop branches (not the conda-forge
# releases) for the fixes noted in [dependencies] above. Tracking the branch
# rather than a pinned commit keeps them current with the latest upstream
# changes; the trade-off is that the resolved version is variable, so a
# re-solve (pixi install / update) can pull newer commits.
flopy = { git = "https://github.com/modflowpy/flopy.git", branch = "develop" }
modflowapi = { git = "https://github.com/MODFLOW-ORG/modflowapi.git", branch = "develop" }

[tasks]
# Launch JupyterLab in the project directory.
jupyter = "jupyter lab"
# Open the project in VS Code (requires the `code` CLI on PATH).
vscode = "code ."
# Build/download the parallel (extended) MODFLOW 6 for the current platform.
# Idempotent: does nothing if `mf6` is already on PATH. Pass --force to rebuild.
get-mf6 = "python scripts/get_mf6.py"
# Install the MODFLOW-family executables the notebooks need but that aren't
# provided by mf6: mp7 (MODPATH 7) for particle tracking, plus gridgen/triangle
# for unstructured grid generation. (mf6 itself comes from the get-mf6 task.)
# Prebuilt binaries come from flopy's get-modflow on the platforms USGS ships
# them for (win-64, linux-64, osx-arm64). On platforms with no prebuilt binaries
# - Intel macs (osx-64) and linux-aarch64 - they are built from source from the
# MODFLOW-ORG repos (get_exes.py delegates to build_exes.py) and installed into
# the env prefix like mf6. Pass --force to rebuild the source-built exes.
get-exes = "python scripts/get_exes.py"
# Verify mp7, triangle, and gridgen are installed on PATH (run after get-exes).
check-exes = "python scripts/check_exes.py"
# Execute notebook(s) end-to-end as a smoke test (fails on any cell error).
# With no arguments it runs the notebooks listed in scripts/run_notebooks.py;
# pass notebook paths to run specific ones. Requires mf6 on PATH (get-mf6).
test-notebooks = "python scripts/run_notebooks.py"
# Install the git pre-commit hook. This runs automatically on first activation
# (see scripts/postinstall.*); this task is the manual/explicit way to (re)install
# it. The hook clears notebook outputs (nbstripout), fixes spelling (codespell),
# and applies ruff lint fixes + formatting on commit.
pre-commit-install = "pre-commit install"
# Run all pre-commit hooks against every file (not just staged changes).
pre-commit-run = "pre-commit run --all-files"

# --- Auto-install parallel (extended) MODFLOW 6 ---------------------------
# conda-forge does NOT ship a parallel-enabled mf6, so we provide it ourselves:
#   * Windows (win-64): download the prebuilt extended nightly and copy it in.
#   * Unix (linux-64, osx-64, osx-arm64): build from source with PETSc/MPI.
# pixi has no post-install hook, so we run the (idempotent) installer from an
# activation script. The first `pixi run`/`pixi shell` performs the build;
# every later activation is a fast no-op once `mf6` is present. Binaries are
# installed into the env prefix so they land on PATH automatically.
[target.unix.activation]
scripts = ["scripts/postinstall.sh"]

[target.win-64.activation]
scripts = ["scripts/postinstall.bat"]

# Build toolchain + extended-build libraries. Unix-only; Windows uses a
# prebuilt binary so it needs no compilers. One GNU toolchain everywhere
# (gcc/g++/gfortran) so mf6 and the from-source executables build the same way,
# matching how MODFLOW-ORG builds its release binaries.
# NOTE: conda-forge only started shipping *real* GNU gcc/g++ on macOS in Nov
# 2025 (before that its mac `gcc` was a clang wrapper). It is currently gcc 15
# only on osx, so the gcc version may differ across platforms - that's fine, it's
# the same compiler family throughout ("exclusive for version differences").
[target.unix.dependencies]
# build toolchain (meson >= 1.3.1 is required by the modpath-v7/triangle/gridgen
# repos built from source; also fine for the mf6 build)
gcc = "*"
gxx = "*"
gfortran = "*"
meson = ">=1.3.1"
ninja = "*"
pkg-config = "*"
# extended-build libraries (parallel + netcdf)
libnetcdf = "*"
netcdf-fortran = "*"
openmpi = "*"
petsc = "==3.20.5"
